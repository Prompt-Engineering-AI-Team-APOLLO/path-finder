services:
  # ── FastAPI application ────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: development          # override to "production" for prod deploys
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      # DATABASE_URL comes from .env (pointing at Supabase).
      # SSL must be true for Supabase connections.
      DATABASE_SSL: "true"
      DATABASE_PGBOUNCER: "false"
      # Redis runs inside Docker on this network alias.
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./app:/app/app              # hot-reload: only mount source, not the whole image
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pathfinder
    ports:
      - "127.0.0.1:5432"       
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pathfinder"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
