name: Deploy Backend to AWS EC2

# Triggers: push to main that touches anything inside backend/
on:
  push:
    branches:
      - main
    paths:
      - "backend/**"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  # ── Job 1: Run tests ────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: backend
        env:
          ENVIRONMENT: test
          SECRET_KEY: test-secret-key-for-ci-only
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          OPENAI_API_KEY: sk-test-placeholder
        run: pytest tests/ -v --tb=short

  # ── Job 2: Deploy to EC2 (only after tests pass) ────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test          # waits for tests to pass first
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "=== Pulling latest code ==="
            cd /home/ec2-user/path-finder
            git pull origin main

            echo "=== Rebuilding Docker image ==="
            cd backend
            docker build --target production -t pathfinder-api:latest .

            echo "=== Restarting container ==="
            docker rm -f pathfinder-api || true
            docker run -d \
              --name pathfinder-api \
              --restart always \
              --env-file .env \
              -e 'CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}' \
              -p 8000:8000 \
              pathfinder-api:latest

            echo "=== Waiting for startup ==="
            sleep 20

            echo "=== Health check ==="
            curl -sf http://localhost:8000/api/v1/health || exit 1

            echo "=== Cleaning old Docker images ==="
            docker image prune -f

            echo "✅ Deploy complete!"
